name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4
      - name: 設定 Node.js 環境
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: 安裝套件與打包網頁
        env:
          CI: false
        run: |
          npm install --legacy-peer-deps
          npm run build
      - name: 上傳打包好的網頁
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./build

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: 發布到 GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
